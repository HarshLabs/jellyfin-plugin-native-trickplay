version: 1.0.0.0
targetAbi: 10.11.0.0
framework: net9.0
overview: Native HLS trickplay for AVPlayer-based clients (Apple TV).
description: |
  Generates HLS I-frame variants so Apple TV / AVPlayer clients get native
  scrubbing thumbnails on the transport bar — no client-side overlay needed.
  One-time ffmpeg cost per item, then cached.
  Includes a configurable daily prune scheduled task (orphan removal,
  age-based eviction, optional LRU size cap) so the cache doesn't grow
  unbounded.
category: General
